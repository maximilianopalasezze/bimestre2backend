spring.application.name=minimarket

server.port=8081

spring.datasource.url=jdbc:h2:mem:minimarketdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Clave usada para firmar JWT. En produccion debe venir desde variable de entorno o gestor de secretos.
jwt.secret=${JWT_SECRET:MiniMarketPlusClaveJwtSegura2026ConMasDe32Caracteres}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# Logs utiles para auditoria y trazabilidad de autenticacion/autorizacion.
logging.level.com.minimarket.security=INFO
logging.level.com.minimarket.controller.AuthController=INFO
logging.level.org.springframework.security=INFO
